  const s = new Set();
  accounts.forEach(a => RAW[a].forEach(d => s.add(d.date)));
  return [...s].sort();
}
const ALL_DATES = getAllDates();
function getMetric(key) { return METRIC_ORDER.find(m => m.key === key); }

function buildDatasets(key) {
  return accounts.map(a => {
    const map = {};
    RAW[a].forEach(d => { if (d[key] != null) map[d.date] = d[key]; });
    return {
      label: a,
      data: ALL_DATES.map(d => map[d] != null ? map[d] : 0),
      borderColor: COLORS[a], backgroundColor: COLORS[a]+'18',
      borderWidth: 2, pointRadius: 2.5, pointHoverRadius: 5,
      tension: 0, spanGaps: true, hidden: hidden.has(a)
    };
  });
}

function buildTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  METRIC_ORDER.forEach(m => {
    const btn = document.createElement('button');
    const isActive = m.key === currentMetric;
    btn.className = isActive ? (m.gold ? 'tab active-gold' : 'tab active') : 'tab';
    btn.dataset.metric = m.key;
    btn.textContent = m.label;
    el.appendChild(btn);
  });
}

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  accounts.forEach(a => {
    const c = COLORS[a];
    const item = document.createElement('div');
    item.className = 'leg-item'+(hidden.has(a)?' muted':'');
    item.style.cssText = `background:${c}20;border-color:${c};color:${c};`;
    item.textContent = a;
    item.onclick = () => { if(hidden.has(a)) hidden.delete(a); else hidden.add(a); updateChart(); };
    el.appendChild(item);
  });
}

function buildSummaries(key) {
  const m = getMetric(key);
  const el = document.getElementById('summaries');
  el.innerHTML = '';

  if (key === 'revenue') {
    let grandTotal = 0;
    const grandDays = new Set();
    accounts.forEach(a => RAW[a].forEach(d => {
      if (d[key] != null && d[key] > 0) { grandTotal += d[key]; grandDays.add(d.date); }
    }));
    const grandAvg = grandTotal / grandDays.size;
    const card = document.createElement('div');
    card.className = 'summary-card gold-card';
    card.innerHTML = `<div class="acct gold-acct">🏆 全部频道合计</div>
      <div class="row"><span class="slabel gold-slabel">总收入</span><span class="sval gold-sval">$${grandTotal.toFixed(1)}</span></div>
      <div class="row"><span class="slabel gold-slabel">日均</span><span class="sval gold-sval">$${grandAvg.toFixed(1)}</span></div>`;
    el.appendChild(card);
  }

  accounts.filter(a => !hidden.has(a)).forEach(a => {
    const vals = RAW[a].map(d => d[key]).filter(v => v != null && v > 0);
    if (!vals.length) return;
    const total = vals.reduce((s,v)=>s+v,0);
    const avg = total / vals.length;
    const c = COLORS[a];
    const card = document.createElement('div');
    card.className = 'summary-card';
    if (m.avgOnly) {
      card.innerHTML = `<div class="acct" style="color:${c}">${a}</div>
        <div class="row"><span class="slabel">日均</span><span class="sval">${m.fmt(avg)}</span></div>`;
    } else {
      card.innerHTML = `<div class="acct" style="color:${c}">${a}</div>
        <div class="row"><span class="slabel">累计</span><span class="sval">${m.fmt(total)}</span></div>
        <div class="row"><span class="slabel">日均</span><span class="sval">${m.fmt(avg)}</span></div>`;
    }
    el.appendChild(card);
  });
}

function buildInsight(key) {
  const list = document.getElementById('insightList');
  list.innerHTML = '';
  (INSIGHTS[key] || []).forEach(text => {
    const li = document.createElement('li');
    li.textContent = text;
    list.appendChild(li);
  });
}

const ctx = document.getElementById('mainChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {labels: ALL_DATES, datasets: buildDatasets('views')},
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: {mode:'index', intersect:false},
    plugins: {
      legend: {display:false},
      tooltip: {callbacks: {
        label: ctx => ` ${ctx.dataset.label}: ${getMetric(currentMetric).fmt(ctx.parsed.y)}`,
        title: items => items[0]?.label||''
      }}
    },
    scales: {
      x: {ticks:{maxTicksLimit:12,maxRotation:35,font:{size:11},color:'#888'},grid:{display:false}},
      y: {ticks:{font:{size:11},color:'#888',callback:v=>getMetric(currentMetric).fmt(v)},grid:{color:'rgba(128,128,128,0.1)'}}
    }
  }
});

function updateChart() {
  chart.data.datasets = buildDatasets(currentMetric);
  chart.update();
  buildTabs();
  buildLegend();
  buildSummaries(currentMetric);
  buildInsight(currentMetric);
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  currentMetric = btn.dataset.metric;
  updateChart();
});

buildTabs();
buildLegend();
buildSummaries('views');
buildInsight('views');
</script>
</body>
</html>
